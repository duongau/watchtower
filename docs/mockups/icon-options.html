<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watchtower Activity Bar Icon Options</title>
<style>
  body { background: #333; color: #fff; font-family: system-ui; padding: 40px; display: flex; gap: 40px; flex-wrap: wrap; }
  .option { text-align: center; padding: 20px; border: 1px solid #555; border-radius: 8px; background: #252526; }
  .option h3 { margin: 12px 0 4px; font-size: 14px; }
  .option p { font-size: 11px; color: #888; }
  .preview { width: 48px; height: 48px; background: #333; display: flex; align-items: center; justify-content: center; margin: 0 auto; border-left: 2px solid #fff; }
  .preview svg { width: 24px; height: 24px; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .large { display: flex; align-items: center; justify-content: center; margin: 16px auto 0; }
  .large svg { width: 64px; height: 64px; stroke: #ccc; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
</style>
</head>
<body>

<div class="option">

  </div>

  </div>
</div>
